name: Accessibility Audit

# Runs on the 3rd of each month at 13:07 UTC (09:07 ET) and on manual dispatch.
# Sends start + finish HTML emails (warm TMolecule palette) via Resend.

on:
  schedule:
    - cron: "7 13 3 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_TO:      ${{ secrets.AUDIT_EMAIL_TO }}
      RESEND_FROM:    "TMolecule Audits <audits@tmolecule.com>"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute run date
        id: date
        run: |
          echo "stamp=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Send START email
        if: env.RESEND_API_KEY != ''
        env:
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_DATE: ${{ steps.date.outputs.stamp }}
        run: python scripts/send-audit-email.py start

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run axe-core audit
        id: audit
        continue-on-error: true
        run: |
          mkdir -p audits
          python scripts/axe-audit.py > audits/axe-${{ steps.date.outputs.stamp }}.log 2>&1
          EXIT=$?
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Determine status
        id: result
        run: |
          if [ "${{ steps.audit.outputs.exit }}" = "0" ]; then
            echo "status=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "status=FAIL" >> "$GITHUB_OUTPUT"
          fi

      - name: Write job summary
        run: |
          {
            echo "# Monthly Accessibility Audit · tmolecule.com"
            echo ""
            echo "**Status:** ${{ steps.result.outputs.status }}"
            echo ""
            echo '```'
            cat "audits/axe-${{ steps.date.outputs.stamp }}.log"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JSON report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report-${{ steps.date.outputs.stamp }}
          path: audits/axe-${{ steps.date.outputs.stamp }}.*
          retention-days: 90

      - name: Commit dated report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audits/axe-${{ steps.date.outputs.stamp }}.* || true
          if ! git diff --cached --quiet; then
            git commit -m "audit: accessibility report ${{ steps.date.outputs.stamp }} (${{ steps.result.outputs.status }})"
            git push
          else
            echo "no new report files to commit"
          fi

      - name: Open issue if violations found
        if: steps.result.outputs.status == 'FAIL'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Accessibility audit failed — ${{ steps.date.outputs.stamp }}`,
              labels: ['accessibility', 'audit'],
              body: `Critical or serious WCAG 2.1 AA violations detected.\n\n**Report:** audits/axe-${{ steps.date.outputs.stamp }}.json\n**Run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

      - name: Send FINISH email
        if: always() && env.RESEND_API_KEY != ''
        env:
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_DATE: ${{ steps.date.outputs.stamp }}
        run: python scripts/send-audit-email.py finish "${{ steps.result.outputs.status }}" "audits/axe-${{ steps.date.outputs.stamp }}.log"
