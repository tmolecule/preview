name = "tmolecule-seo"
main = "src/index.js"
compatibility_date = "2026-04-01"
account_id = "6766841fb403fe06a6e2c1f2ea3b5ea0"
workers_dev = true

# Worker runs on the learn.tmolecule.com subdomain only.
# Shopify owns tmolecule.com and www.tmolecule.com via Cloudflare for SaaS,
# so a subdomain is the only place our Worker can intercept traffic.
[[routes]]
pattern = "learn.tmolecule.com/*"
zone_name = "tmolecule.com"

# KV namespace for page content.
[[kv_namespaces]]
binding = "LEARN_PAGES"
id = "8103e78f27d14611baa93bd0d367293c"
preview_id = "6619209e0aaf4870aa03c9f0119fbf82"

# R2 bucket for password-gated marketing decks.
[[r2_buckets]]
binding = "DECKS"
bucket_name = "tmolecule-decks"

# Analytics Engine dataset for deck view + per-slide tracking.
# Auto-created on first writeDataPoint() call.
[[analytics_engine_datasets]]
binding = "DECK_ANALYTICS"
dataset = "tmolecule_deck_analytics"

[vars]
SITE_NAME = "TMolecule"
SHOP_ORIGIN = "https://tmolecule.com"
LOGO_URL = "https://tmolecule.com/cdn/shop/files/logo.png?v=1654437257"
GSC_VERIFICATION = "SFYPUwnKraRF0kqkMv8AoCoVAO5O_AU8LZTJ5uBrHN4"
AUTHOR_NAME = "PGP Iyer"

[observability]
enabled = true
